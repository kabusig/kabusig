# 平日 大引け後バッチ: 株価取得 → 指標計算 → シグナル判定 → 通知
# JST 16:00 = UTC 07:00(GitHub Actions cron は UTC)
name: batch-daily

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r batch/requirements.txt
      - name: Run pipeline
        working-directory: batch
        env:
          DATA_BACKEND: ${{ vars.DATA_BACKEND }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_DEV_USER_ID: ${{ secrets.LINE_DEV_USER_ID }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          python fetch_stocklist.py
          python fetch_prices.py --bulk --period 3mo
          python calc_indicators.py
          python detect_signals.py
          python calc_signal_results.py
          python fetch_news.py
          python send_notifications.py
