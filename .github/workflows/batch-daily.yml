# 平日 大引け後バッチ: 株価取得 → 指標計算 → シグナル判定 → Supabase同期 → 通知
# JST 16:00 = UTC 07:00(GitHub Actions cron は UTC)
#
# アーキテクチャ: SQLite(data/local.db)を計算用の作業領域として
# actions/cache で持ち回り、計算結果を push_supabase.py で配信用DBへ同期する。
name: batch-daily

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r batch/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/local.db
          key: stockdb-${{ github.run_id }}
          restore-keys: stockdb-

      - name: Run pipeline
        working-directory: batch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_DEV_USER_ID: ${{ secrets.LINE_DEV_USER_ID }}
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          python fetch_stocklist.py
          # 初回(キャッシュなし)は2年分、以後は直近3ヶ月を差分更新
          if [ -f ../data/local.db ]; then PERIOD=3mo; else PERIOD=2y; fi
          python fetch_prices.py --bulk --period $PERIOD
          python calc_indicators.py
          python detect_signals.py
          python calc_signal_results.py
          python fetch_news.py

      - name: Push to Supabase
        if: ${{ vars.PUSH_SUPABASE == 'true' }}
        working-directory: batch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python push_supabase.py

      - name: Send notifications (paid members)
        if: ${{ vars.PUSH_SUPABASE == 'true' }}
        working-directory: batch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: python send_notifications.py --members
