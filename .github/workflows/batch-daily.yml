# 平日 18:00 JST の日次バッチ:
#   銘柄マスタ → 株価(J-Quants) → 指標 → シグナル検知 → 結果統計 → Supabase同期 → LINE通知
#
# 5年分の計算用SQLite(data/local.db)は actions/cache で持ち回る。
# 初回(キャッシュなし)は全履歴を取得し、以後は当日分だけ取得して差分更新する。
#
# 【起動方法】GitHub の schedule は混雑時に数時間遅延・スキップされるため使わない。
# 時刻の正確な Vercel Cron(/api/cron/batch, 平日 18:00 JST)から workflow_dispatch で起動する。
# 手動実行も Actions 画面の "Run workflow" から可能。
name: batch-daily

on:
  workflow_dispatch:

concurrency:
  group: batch-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r batch/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/local.db
          key: stockdb-${{ github.run_id }}
          restore-keys: stockdb-

      - name: Run daily pipeline
        working-directory: batch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NEXT_PUBLIC_APP_URL: https://kabusig.com
        run: |
          set -e
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "対象日(JST): $TODAY"
          python fetch_stocklist.py

          # 履歴の有無で全取得/差分取得を切り替え(100MB未満なら初回とみなす)
          if [ -f ../data/local.db ] && [ "$(stat -c%s ../data/local.db)" -gt 100000000 ]; then
            echo "=== 差分更新(当日分) ==="
            python fetch_prices_jquants.py --date "$TODAY"
            python calc_indicators.py
            python detect_signals.py --date "$TODAY"
          else
            echo "=== 初回:全履歴を構築 ==="
            python fetch_prices_jquants.py --bulk
            python calc_indicators.py
            python detect_signals.py --backfill
          fi

          python calc_signal_results.py
          python push_supabase.py

      - name: Send LINE notifications (paid members)
        if: ${{ vars.SEND_LINE == 'true' }}
        working-directory: batch
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NEXT_PUBLIC_APP_URL: https://kabusig.com
        run: python send_notifications.py --members
