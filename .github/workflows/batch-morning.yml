# 平日 朝バッチ: 決算発表予定の取得・通知(フェーズ2で有効化)
# JST 08:00 = UTC 23:00 前日
name: batch-morning

on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r batch/requirements.txt
      - name: Fetch earnings schedule
        working-directory: batch
        env:
          DATA_BACKEND: ${{ vars.DATA_BACKEND }}
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_earnings.py
